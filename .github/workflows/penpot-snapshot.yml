name: penpot-snapshot
on:
  schedule:
    - cron: '0 6 * * *'  # nightly 06:00 UTC
  workflow_dispatch: {}
jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Export .penpot files
        env:
          PENPOT_TOKEN: ${{ secrets.PENPOT_TOKEN }}
          PENPOT_API: ${{ vars.PENPOT_API }}
        run: node penpot/scripts/export-snapshot.js
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain penpot/files/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add penpot/files/
            git commit -m "chore(penpot): nightly snapshot $(date -u +%F)"
            git push
          fi
