name: release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish Penpot library
        env:
          PENPOT_TOKEN: ${{ secrets.PENPOT_TOKEN }}
          PENPOT_API: ${{ vars.PENPOT_API }}
        run: node penpot/scripts/publish-library.js
      - name: Bundle release assets
        run: |
          mkdir -p release
          cp packages/tokens/src/tokens.penpot.json release/
          cp -r penpot/files release/penpot-files
          cp -r packages/penpot-plugin/dist release/penpot-plugin
          cp -r apps/docs/dist release/docs
          tar czf release/ufpe-design-system-${GITHUB_REF_NAME}.tgz -C release .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/tokens.penpot.json
            release/ufpe-design-system-*.tgz
            release/penpot-files/*.penpot
